services:
  postgres:
    image: postgres:16-alpine
    container_name: jmswebshield_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jmswebshield_store
      POSTGRES_USER: homestead
      POSTGRES_PASSWORD: secret
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jmswebshield_redis
    restart: unless-stopped
    ports:
      - "63790:6379"

volumes:
  postgres_data: